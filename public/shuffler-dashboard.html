<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM Shuffler Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; }
        .glass { background: rgba(30,41,59,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,0.4)} 50%{box-shadow:0 0 0 6px rgba(139,92,246,0)} }
        .working-glow { animation: pulseGlow 2.5s ease-in-out infinite; }
    </style>
</head>
<body>
<div class="min-h-screen p-4 md:p-6 flex flex-col items-center">

    <!-- Header -->
    <div class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center mb-6 gap-4 glass p-5 rounded-3xl border border-white/10 shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-violet-600 rounded-2xl flex items-center justify-center shadow-lg shadow-violet-500/30">
                <span class="text-xl font-black text-white">SH</span>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tight text-white uppercase">SHUFFLER <span class="text-violet-400">DASHBOARD</span></h1>
                <p class="text-slate-400 text-xs font-bold tracking-widest uppercase opacity-70">Live Rotation Display</p>
            </div>
        </div>

        <!-- Shift selector -->
        <div class="flex bg-black/40 p-1 rounded-xl border border-white/5 gap-1">
            <button onclick="changeShift(1)" id="shift-btn-1" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-violet-600 text-white">SHIFT 1</button>
            <button onclick="changeShift(2)" id="shift-btn-2" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white">SHIFT 2</button>
            <button onclick="changeShift(3)" id="shift-btn-3" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white">SHIFT 3</button>
        </div>

        <!-- View toggle -->
        <div class="flex bg-black/40 p-1 rounded-xl border border-white/5 gap-1">
            <button onclick="setView('studios')" id="view-studios" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-violet-600 text-white">STUDIOS</button>
            <button onclick="setView('matrix')" id="view-matrix" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white">MATRIX</button>
        </div>

        <div id="clock" class="text-xl font-mono font-bold text-violet-400 bg-black/40 px-4 py-2 rounded-xl border border-white/10">00:00:00</div>
    </div>

    <!-- Stats bar -->
    <div class="w-full max-w-7xl glass p-4 rounded-2xl border border-white/10 mb-5 shadow-lg">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
            <div>
                <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-0.5">Toplam</div>
                <div id="stat-total" class="text-2xl font-black text-white">—</div>
            </div>
            <div>
                <div class="text-[9px] font-black text-violet-400 uppercase tracking-widest mb-0.5">Çalışıyor</div>
                <div id="stat-working" class="text-2xl font-black text-violet-400">—</div>
            </div>
            <div>
                <div class="text-[9px] font-black text-amber-400 uppercase tracking-widest mb-0.5">Mola</div>
                <div id="stat-break" class="text-2xl font-black text-amber-400">—</div>
            </div>
            <div>
                <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-0.5">Interval</div>
                <div id="stat-interval" class="text-2xl font-black text-slate-300">—</div>
            </div>
        </div>
    </div>

    <main class="w-full max-w-7xl">
        <div id="content" class="min-h-[500px]"></div>
    </main>
</div>

<script>
    const STUDIOS_META = {
        '7':{b:'A2'}, '10':{b:'A2'}, '3&4':{b:'A2'},
        '8':{b:'E1'}, '9':{b:'E1'}
    };
    const STUDIO_ORDER = ['7','10','3&4','8','9'];
    ['RS','SR'].forEach(lang => {
        for(let i=1;i<=6;i++){
            const sid=`${lang}${i}`;
            STUDIOS_META[sid]={ b: i<=3?'A2':'E1' };
            STUDIO_ORDER.push(sid);
        }
    });

    let state = { shift:1, shufflers:[], phase:0, currentInterval:0, view:'studios' };
    let matStudio = '7'; let matLang = 'TR';

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);

    function getLang(sid) {
        if(['7','10','3&4','8','9'].includes(sid)) return 'TR';
        if(sid.startsWith('RS')) return 'RS';
        return 'SR';
    }

    async function changeShift(s) {
        state.shift = s;
        [1,2,3].forEach(n => {
            document.getElementById(`shift-btn-${n}`).className = (n===s)
                ? 'px-4 py-2 rounded-lg text-xs font-bold transition-all bg-violet-600 text-white'
                : 'px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white';
        });
        await sync();
    }

    function setView(v) {
        state.view = v;
        ['studios','matrix'].forEach(k => {
            document.getElementById('view-'+k).className = (k===v)
                ? 'px-4 py-2 rounded-lg text-xs font-bold transition-all bg-violet-600 text-white'
                : 'px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white';
        });
        renderContent();
    }

    async function sync() {
        try {
            const r = await fetch(`/api/shf/state?shift=${state.shift}`);
            const data = await r.json();
            state.phase = data.phase;
            state.shufflers = data.shufflers;
            state.currentInterval = data.currentInterval;
            updateStats();
            renderContent();
        } catch(e) {}
    }

    function updateStats() {
        const active = state.shufflers.filter(p => p.status === 'active');
        let working = 0, onBreak = 0;
        if (state.phase === 2) {
            active.forEach(p => {
                const v = p.schedule[state.currentInterval];
                if (v && v !== '/') working++;
                else if (v === '/') onBreak++;
            });
        }
        document.getElementById('stat-total').innerText = state.shufflers.length || '—';
        document.getElementById('stat-working').innerText = state.phase === 2 ? working : '—';
        document.getElementById('stat-break').innerText = state.phase === 2 ? onBreak : '—';
        document.getElementById('stat-interval').innerText = state.phase === 2 ? `INT ${state.currentInterval+1}` : '—';
    }

    function renderContent() {
        const el = document.getElementById('content');
        if (state.phase === 0) {
            el.innerHTML = `<div class="h-[400px] flex items-center justify-center text-slate-500 font-bold italic glass rounded-3xl opacity-50">Shift ${state.shift}: Bekleniyor...</div>`;
            return;
        }
        if (state.view === 'studios') renderStudios();
        else renderMatrix();
    }

    // ── STUDIOS VIEW ──────────────────────────────────────────────────────────
    function renderStudios() {
        const el = document.getElementById('content');
        let html = `<div class="fade-in space-y-8">`;

        ['A2','E1'].forEach(bldg => {
            const bStudios = STUDIO_ORDER.filter(sid => STUDIOS_META[sid].b === bldg);
            html += `<div class="glass p-6 rounded-3xl border border-white/10 shadow-xl">
                <h2 class="text-base font-black text-violet-400 mb-6 border-b border-white/10 pb-3 flex items-center gap-3 uppercase tracking-widest">
                    <span class="bg-violet-600/20 px-3 py-1 rounded-lg">🏢</span> Building ${bldg}
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">`;

            bStudios.forEach(sid => {
                const active = state.shufflers.filter(p => p.studio === sid && p.status === 'active');
                const pending = state.shufflers.filter(p => p.studio === sid && p.status !== 'active');
                const working = state.phase === 2 ? active.filter(p => p.schedule[state.currentInterval] && p.schedule[state.currentInterval] !== '/') : [];
                const onBreak = state.phase === 2 ? active.filter(p => p.schedule[state.currentInterval] === '/') : [];

                html += `<div class="bg-black/30 p-4 rounded-2xl border border-white/5 hover:border-violet-500/20 transition-colors">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-black text-white bg-slate-800 px-3 py-1.5 rounded-lg tracking-wide">STUDIO ${sid}</h3>
                        <div class="flex items-center gap-1.5">
                            <span class="text-[9px] font-black text-violet-400 bg-violet-500/10 px-2 py-1 rounded-md border border-violet-500/20">${active.length} aktif</span>
                            ${pending.length > 0 ? `<span class="text-[9px] font-bold text-slate-500 bg-slate-800/60 px-2 py-1 rounded-md">${pending.length} bekliyor</span>` : ''}
                        </div>
                    </div>`;

                if (state.phase === 2) {
                    // Working row
                    html += `<div class="mb-3">
                        <div class="text-[8px] font-black text-violet-400 uppercase tracking-widest mb-2 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-violet-500 animate-pulse inline-block"></span> ÇALIŞIYOR (${working.length})
                        </div>
                        <div class="flex flex-wrap gap-1.5">
                            ${working.length > 0
                                ? working.map(p => `<div class="working-glow bg-violet-600 text-white text-[9px] font-mono font-black px-2.5 py-1.5 rounded-lg border border-violet-400/30">#${p.id}</div>`).join('')
                                : '<span class="text-[9px] text-slate-700 italic">Kimse yok</span>'
                            }
                        </div>
                    </div>
                    <div>
                        <div class="text-[8px] font-black text-amber-500 uppercase tracking-widest mb-2 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-amber-500 inline-block"></span> MOLA (${onBreak.length})
                        </div>
                        <div class="flex flex-wrap gap-1.5">
                            ${onBreak.length > 0
                                ? onBreak.map(p => `<div class="bg-amber-900/40 text-amber-400 text-[9px] font-mono font-bold px-2.5 py-1.5 rounded-lg border border-amber-700/30">#${p.id}</div>`).join('')
                                : '<span class="text-[9px] text-slate-700 italic">Kimse yok</span>'
                            }
                        </div>
                    </div>`;
                } else {
                    // Phase 1: show all
                    html += `<div class="flex flex-wrap gap-1.5">
                        ${active.map(p => `<div class="bg-violet-700/40 text-violet-300 text-[9px] font-mono font-bold px-2 py-1 rounded-lg border border-violet-500/20">#${p.id}</div>`).join('')}
                        ${pending.map(p => `<div class="bg-slate-800/60 text-slate-600 text-[9px] font-mono px-2 py-1 rounded-lg border border-white/5">#${p.id}</div>`).join('')}
                    </div>`;
                }

                html += `</div>`;
            });

            html += `</div></div>`;
        });

        el.innerHTML = html + `</div>`;
    }


    // ── MATRIX VIEW ───────────────────────────────────────────────────────────
    function renderMatrix() {
        const el = document.getElementById('content');
        const studios = STUDIO_ORDER.filter(sid => {
            if (matLang === 'TR') return ['7','10','3&4','8','9'].includes(sid);
            return sid.startsWith(matLang);
        });
        if (!studios.includes(matStudio)) matStudio = studios[0];

        let html = `<div class="fade-in space-y-4">
            <div class="flex gap-2 p-2 bg-black/20 rounded-2xl border border-white/5">
                ${['TR','RS','SR'].map(l => `<button onclick="matLang='${l}';renderMatrix()" class="px-5 py-2 rounded-xl text-xs font-black transition-all ${matLang===l?'bg-violet-600 text-white':'text-slate-400 hover:text-white'}">${l}</button>`).join('')}
            </div>
            <div class="flex flex-wrap gap-2">
                ${studios.map(sid => `<button onclick="matStudio='${sid}';renderMatrix()" class="px-3 py-2 rounded-xl text-[10px] font-black transition-all ${matStudio===sid?'bg-violet-700 text-white':'bg-white/5 text-slate-400 hover:text-white'}">${sid}</button>`).join('')}
            </div>`;

        const people = state.shufflers.filter(p => p.studio === matStudio && p.status === 'active');

        html += `<div class="glass rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
            <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
            <thead><tr class="bg-slate-950/80 text-[9px] font-black tracking-widest text-slate-500 uppercase">
                <th class="p-4 sticky left-0 bg-slate-900 border-r border-white/5 w-28">Shuffler</th>
                ${Array.from({length:16},(_,i) => {
                    const cur = state.currentInterval === i;
                    return `<th class="px-2 py-4 text-center border-r border-white/5 whitespace-nowrap min-w-[80px] ${cur?'bg-violet-600/20 text-violet-400':''}">INT ${i+1}</th>`;
                }).join('')}
            </tr></thead>
            <tbody class="divide-y divide-white/5">
            ${people.map(p => {
                return `<tr class="hover:bg-white/5 transition-colors">
                    <td class="p-3 font-mono font-black sticky left-0 border-r border-white/5 bg-violet-700 text-white text-xs">#${p.id}</td>
                    ${(p.schedule||[]).map((val, i) => {
                        const isCurrent = state.currentInterval === i;
                        const isWork = val && val !== '/' && val !== '';
                        const isBreak = val === '/';
                        const isFuture = i > state.currentInterval && !val;
                        const bgCls = isCurrent ? 'bg-violet-600/10 ring-1 ring-inset ring-violet-500/30' : '';
                        let pill;
                        if (isFuture) {
                            pill = '<span class="text-slate-800 text-[9px]">…</span>';
                        } else if (isWork) {
                            pill = '<span class="inline-block bg-violet-600 text-white text-[9px] font-black px-2.5 py-1 rounded-full leading-none">WORK</span>';
                        } else if (isBreak) {
                            pill = '<span class="inline-block bg-amber-600/25 text-amber-400 text-[9px] font-black px-2 py-1 rounded-full border border-amber-600/30 leading-none">MOLA</span>';
                        } else {
                            pill = '<span class="text-slate-700 text-[9px]">–</span>';
                        }
                        return `<td class="px-2 py-3 text-center border-r border-white/5 ${bgCls}">${pill}</td>`;
                    }).join('')}
                </tr>`;
            }).join('')}
            </tbody>
            </table></div></div></div>`;

        el.innerHTML = html;
    }


    setInterval(sync, 4000);
    sync();
</script>
</body>
</html>
