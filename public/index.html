<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM Studio Rotation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="min-h-screen p-4 md:p-8 flex flex-col items-center">
        <!-- Header -->
        <div class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center mb-8 gap-4 glass p-6 rounded-3xl border border-white/10 shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <span class="text-2xl font-black text-white">W</span>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-white uppercase">WFM <span class="text-blue-500">DASHBOARD</span></h1>
                    <p id="ui-subtitle" class="text-slate-400 text-xs font-bold tracking-widest uppercase opacity-70">Live Studio Rotation</p>
                </div>
            </div>
            
            <div class="flex bg-black/40 p-1 rounded-xl border border-white/5 gap-1">
                <button onclick="changeShift(1)" id="shift-btn-1" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white">SHIFT 1</button>
                <button onclick="changeShift(2)" id="shift-btn-2" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white">SHIFT 2</button>
                <button onclick="changeShift(3)" id="shift-btn-3" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white">SHIFT 3</button>
            </div>

            <div id="clock" class="text-xl font-mono font-bold text-blue-500 bg-black/40 px-4 py-2 rounded-xl border border-white/10">00:00:00</div>
        </div>

        <main class="w-full max-w-7xl space-y-4">
            <!-- Sort Status Panel (always visible) -->
            <div id="sort-status"></div>
            <div id="content" class="min-h-[500px]"></div>
        </main>
    </div>

    <script>
        const STUDIOS = {
            '7':    { b: 'A2', t: ['7.1','7.2','7.3','7.4'], pop: 30 },
            '10':   { b: 'A2', t: ['10.1','10.2','10.3','10.4'], pop: 30 },
            '3&4':  { b: 'A2', t: ['3.1','3.2','3.3','4.1'], pop: 30 },
            '8':    { b: 'E1', t: ['8.1','8.2','8.3','8.4','8.5'], pop: 30 },
            '9':    { b: 'E1', t: ['9.1','9.2','9.3','9.4','9.5'], pop: 30 }
        };
        const STUDIO_ORDER = ['7', '10', '3&4', '8', '9'];
        ['RS', 'SR'].forEach(lang => {
            for(let i=1; i<=6; i++) {
                const sid = `${lang}${i}`; 
                const building = (i <= 3) ? 'A2' : 'E1';
                STUDIOS[sid] = { b: building, t: Array.from({length: 5}, (_, idx) => `${sid}.${idx+1}`), pop: 25 };
                STUDIO_ORDER.push(sid);
            }
        });

        let state = { shift: 1, presenters: [], phase: 0, currentInterval: 0, matrixLang: 'TR', matrixStudio: '7', sortStudios: [] };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);

        async function changeShift(s) {
            state.shift = s;
            [1,2,3].forEach(n => document.getElementById(`shift-btn-${n}`).className = (n===s)?"px-4 py-2 rounded-lg text-xs font-bold bg-blue-600 text-white":"px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white");
            await sync();
        }

        async function sync() {
            try {
                let r = await fetch(`/api/state?shift=${state.shift}`);
                let data = await r.json();
                state.phase = data.phase;
                state.presenters = data.presenters;
                state.currentInterval = data.currentInterval;
                state.sortStudios = data.sortStudios || [];
                renderSortPanel();
                refreshUI();
            } catch(e) {}
        }

        function renderSortPanel() {
            const sortList = state.sortStudios || [];
            const el = document.getElementById('sort-status');
            if (!el) return;
            el.innerHTML = `<div class="glass rounded-2xl border ${
                sortList.length > 0 ? 'border-orange-500/50' : 'border-white/5'
            } px-5 py-4 transition-all">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black uppercase tracking-widest ${
                        sortList.length > 0 ? 'text-orange-400' : 'text-slate-600'
                    }">🔀 SORT BEKLEYEN STÜDYOLAR</span>
                    ${ sortList.length > 0
                        ? `<span class="text-[9px] bg-orange-500 text-white px-2 py-0.5 rounded-full font-black animate-pulse">${sortList.length}</span>`
                        : `<span class="text-[9px] text-slate-700 font-bold">— Yok</span>`
                    }
                    ${ sortList.length > 0
                        ? `<div class="flex flex-wrap gap-2 ml-2">${sortList.map(sid =>
                            `<div class="flex items-center gap-1.5 bg-orange-500/15 border border-orange-500/40 px-3 py-1.5 rounded-xl">
                                <span class="inline-block w-2 h-2 rounded-full bg-orange-400 animate-pulse"></span>
                                <span class="text-xs font-black text-orange-300">Studio ${sid}</span>
                            </div>`).join('')}</div>`
                        : `<span class="text-xs text-slate-700 font-bold italic">Tüm stüdyolar temiz ✓</span>`
                    }
                </div>
            </div>`;
        }

        function refreshUI() {
            const container = document.getElementById('content');
            if (state.phase === 0) {
                container.innerHTML = `<div class="h-[400px] flex items-center justify-center text-slate-500 font-bold italic glass rounded-3xl opacity-50">Shift ${state.shift}: Waiting for roster publication...</div>`;
                return;
            }
            if (state.phase === 1) {
                container.innerHTML = `<div class="fade-in grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${LANGUAGES.map(lang => `
                    <div class="glass p-6 rounded-3xl border border-white/5"><h2 class="text-blue-400 font-black mb-4 uppercase text-xs tracking-widest">${lang} GROUP</h2>
                        <div class="space-y-3">${STUDIO_ORDER.filter(s => isStudioInLang(s, lang)).map(sid => {
                            let ppl = state.presenters.filter(p => p.studio === sid);
                            return `<div class="bg-black/20 p-3 rounded-xl border border-white/5 flex justify-between items-center"><span class="font-bold text-slate-300 text-xs text-sm">Studio ${sid}</span><span class="text-[10px] text-slate-500 font-mono">${ppl.length} Pers.</span></div>`;
                        }).join('')}</div></div>`).join('')}</div>`;
                return;
            }
            renderMatrix();
        }

        const LANGUAGES = ['TR','RS','SR'];
        function renderMatrix() {
            const container = document.getElementById('content');
            const studios = STUDIO_ORDER.filter(s => isStudioInLang(s, state.matrixLang));
            if (!studios.includes(state.matrixStudio)) state.matrixStudio = studios[0];
            let html = `<div class="fade-in space-y-6">
                <div class="flex gap-2 p-2 bg-black/20 rounded-2xl border border-white/5">${LANGUAGES.map(l => `<button onclick="state.matrixLang='${l}'; renderMatrix()" class="px-6 py-2 rounded-xl text-xs font-black transition-all ${state.matrixLang===l?'bg-blue-600 text-white':'text-slate-400 hover:text-white'}">${l}</button>`).join('')}</div>
                <div class="flex flex-wrap gap-2">${studios.map(sid => `<button onclick="state.matrixStudio='${sid}'; renderMatrix()" class="px-4 py-2 rounded-xl text-[10px] font-black transition-all ${state.matrixStudio===sid?'bg-emerald-600 text-white':'bg-white/5 text-slate-400 hover:text-white'}">${sid}</button>`).join('')}</div>`;
            let people = state.presenters.filter(p => p.studio === state.matrixStudio);
            
            // Sort by status: Ready > Arrived > Pending
            people.sort((a, b) => {
                const order = { 'ready': 0, 'arrived': 1, 'pending': 2 };
                return (order[a.status || 'pending'] || 2) - (order[b.status || 'pending'] || 2);
            });

            html += `<div class="glass rounded-3xl overflow-hidden border border-white/10 shadow-2xl transition-all"><div class="overflow-x-auto"><table class="w-full text-left text-sm border-collapse"><thead><tr class="bg-slate-950/80 text-[10px] font-black tracking-widest text-slate-500 uppercase">
                <th class="p-4 sticky left-0 bg-slate-900 border-r border-white/5 w-40">Presenter</th>
                ${Array.from({length:16}, (_,i) => `<th class="p-4 text-center border-r border-white/5 ${state.currentInterval===i?'bg-blue-600/20 text-blue-400':''}">INT ${i+1}</th>`).join('')}
                </tr></thead><tbody class="divide-y divide-white/5">${people.map(p => {
                    const isOnAir = (p.schedule[state.currentInterval] !== '/' && p.schedule[state.currentInterval] !== '/X');
                    let idBgClass = "bg-slate-800 text-slate-300";
                    if (p.status === 'ready') idBgClass = "bg-emerald-600 text-white shadow-[inset_4px_0_0_0_#059669]";
                    else idBgClass = "bg-amber-500 text-black shadow-[inset_4px_0_0_0_#d97706]";
                    
                    return `
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="p-4 font-mono font-bold sticky left-0 border-r border-white/5 ${idBgClass}">
                            <div class="flex items-center justify-between gap-2">
                                <span>#${p.id}</span>
                                ${isOnAir ? `<button onclick="notifySwap('${p.id}', '${state.matrixStudio}')" class="text-[8px] bg-rose-600/30 hover:bg-rose-600 text-rose-500 hover:text-white px-2 py-1 rounded font-black transition-all">EXCHANGE</button>` : ''}
                            </div>
                        </td>
                        ${p.schedule.map((val, i) => {
                            let isFuture = (i > state.currentInterval && val === '');
                            let c = (val==='/'||val==='/X') ? 'text-amber-500' : 'text-emerald-400 font-black';
                            if (isFuture) c = 'text-slate-700 italic text-[10px]';
                            if (state.currentInterval === i) c += ' bg-blue-500/10 ring-1 ring-inset ring-blue-500/50';
                            
                            let displayVal = isFuture ? '...' : val;
                            return `<td class="p-4 text-center border-r border-white/5 ${c} ${isFuture?'opacity-20':''}">${displayVal}</td>`;
                        }).join('')}
                    </tr>`;
                }).join('')}</tbody></table></div></div></div>`;

            html += `</div>`;
            container.innerHTML = html;
        }

        async function notifySwap(id, sid) {
            if(!confirm("Request Extra Change for #" + id + "?")) return;
            try {
                await fetch('/api/notify-swap', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shift: state.shift, presenterId: id, studio: sid })
                });
                alert("Request sent to Admin!");
            } catch(e) { alert("Failed to send request."); }
        }

        function isStudioInLang(sid, lang) {
            if (lang === 'TR') return ['7','10','3&4','8','9'].includes(sid);
            return sid.startsWith(lang);
        }

        setInterval(sync, 5000);
        sync();
        renderSortPanel();
    </script>
</body>
</html>
