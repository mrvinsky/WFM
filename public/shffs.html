<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM SHFFS · Shuffler Floor Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; }
        .glass { background: rgba(30,41,59,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
        .pulse-badge { animation: pulseBadge 2s ease-in-out infinite; }
        @keyframes pulseBadge { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>
<body>
<div class="min-h-screen p-4 md:p-6 flex flex-col items-center">

    <!-- Header -->
    <div class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center mb-6 gap-4 glass p-5 rounded-3xl border border-white/10 shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-violet-600 rounded-2xl flex items-center justify-center shadow-lg shadow-violet-500/30">
                <span class="text-lg font-black text-white">SH</span>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight text-white uppercase">WFM <span class="text-violet-400">SHFFS</span></h1>
                <p class="text-slate-400 text-xs font-bold tracking-widest uppercase opacity-70">Shuffler Floor Screen</p>
            </div>
        </div>

        <div class="flex bg-black/40 p-1 rounded-xl border border-white/5 gap-1">
            <button onclick="changeShift(1)" id="shift-btn-1" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-violet-600 text-white">SHIFT 1</button>
            <button onclick="changeShift(2)" id="shift-btn-2" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white">SHIFT 2</button>
            <button onclick="changeShift(3)" id="shift-btn-3" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white">SHIFT 3</button>
        </div>

        <div id="clock" class="text-xl font-mono font-bold text-violet-400 bg-black/40 px-4 py-2 rounded-xl border border-white/10">00:00:00</div>
    </div>

    <!-- Filters -->
    <div class="w-full max-w-7xl glass p-4 rounded-2xl border border-white/10 mb-5 shadow-lg">
        <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
            <!-- Status filter -->
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">STATUS:</span>
                <div class="flex bg-black/40 p-1 rounded-xl border border-white/5 gap-1">
                    <button onclick="setFilter('all')" id="filter-all" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-slate-700 text-white">ALL</button>
                    <button onclick="setFilter('pending')" id="filter-pending" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-amber-500 hover:bg-white/5">NOT HERE</button>
                    <button onclick="setFilter('active')" id="filter-active" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-violet-400 hover:bg-white/5">ACTIVE</button>
                </div>
            </div>

            <!-- Lang filter -->
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">LANG:</span>
                <div class="flex bg-black/40 p-1 rounded-xl border border-white/5 gap-1">
                    <button onclick="setLang('ALL')" id="lang-ALL" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white">ALL</button>
                    <button onclick="setLang('TR')" id="lang-TR" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:bg-white/5">TR</button>
                    <button onclick="setLang('RS')" id="lang-RS" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:bg-white/5">RS</button>
                    <button onclick="setLang('SR')" id="lang-SR" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:bg-white/5">SR</button>
                </div>
            </div>

            <!-- Bldg filter -->
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest md:pl-4 md:border-l border-white/10">BLDG:</span>
                <div class="flex bg-black/40 p-1 rounded-xl border border-white/5 gap-1">
                    <button onclick="setBldg('ALL')" id="bldg-ALL" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-rose-600 text-white">ALL</button>
                    <button onclick="setBldg('A2')" id="bldg-A2" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:bg-white/5">A2</button>
                    <button onclick="setBldg('E1')" id="bldg-E1" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:bg-white/5">E1</button>
                </div>
            </div>
        </div>
    </div>

    <main class="w-full max-w-7xl">
        <div id="content" class="min-h-[500px]"></div>
    </main>
</div>

<script>
    const STUDIOS = {
        '7':{b:'A2'}, '10':{b:'A2'}, '3&4':{b:'A2'},
        '8':{b:'E1'}, '9':{b:'E1'}
    };
    const STUDIO_ORDER = ['7','10','3&4','8','9'];
    ['RS','SR'].forEach(lang => {
        for (let i=1;i<=6;i++) {
            const sid=`${lang}${i}`;
            STUDIOS[sid]={ b: i<=3?'A2':'E1' };
            STUDIO_ORDER.push(sid);
        }
    });

    let state = { shift:1, shufflers:[], phase:0, currentInterval:0 };
    let filterStatus='all', filterLang='ALL', filterBldg='ALL';

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);

    async function changeShift(s) {
        state.shift = s;
        [1,2,3].forEach(n => {
            document.getElementById(`shift-btn-${n}`).className = (n===s)
                ? 'px-4 py-2 rounded-lg text-xs font-bold transition-all bg-violet-600 text-white'
                : 'px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white';
        });
        await sync();
    }

    function setFilter(f) {
        filterStatus = f;
        ['all','pending','active'].forEach(k => {
            const btn = document.getElementById('filter-'+k);
            if (k===f) btn.className='px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-slate-700 text-white';
            else {
                const col=(k==='pending')?'text-amber-500':(k==='active')?'text-violet-400':'text-slate-400';
                btn.className=`px-4 py-1.5 rounded-lg text-xs font-bold transition-all hover:bg-white/5 ${col}`;
            }
        });
        renderList();
    }

    function setLang(l) {
        filterLang = l;
        ['ALL','TR','RS','SR'].forEach(k => {
            document.getElementById('lang-'+k).className = (k===l)
                ? 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white'
                : 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:bg-white/5';
        });
        renderList();
    }

    function setBldg(b) {
        filterBldg = b;
        ['ALL','A2','E1'].forEach(k => {
            document.getElementById('bldg-'+k).className = (k===b)
                ? 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-rose-600 text-white'
                : 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:bg-white/5';
        });
        renderList();
    }

    function getLangOfStudio(sid) {
        if (['7','10','3&4','8','9'].includes(sid)) return 'TR';
        if (sid.startsWith('RS')) return 'RS';
        if (sid.startsWith('SR')) return 'SR';
        return 'ALL';
    }

    async function sync() {
        try {
            const r = await fetch(`/api/shf/state?shift=${state.shift}`);
            const data = await r.json();
            state.phase = data.phase;
            state.shufflers = data.shufflers;
            state.currentInterval = data.currentInterval;
            renderList();
        } catch(e) {}
    }

    function renderList() {
        const el = document.getElementById('content');
        if (state.phase === 0) {
            el.innerHTML = `<div class="h-[400px] flex items-center justify-center text-slate-500 font-bold italic glass rounded-3xl opacity-50">Shift ${state.shift}: Waiting for shuffler roster...</div>`;
            return;
        }

        let filtered = state.shufflers.filter(p => {
            if (filterStatus !== 'all' && (p.status||'pending') !== filterStatus) return false;
            if (filterBldg !== 'ALL' && p.building !== filterBldg) return false;
            if (filterLang !== 'ALL' && getLangOfStudio(p.studio) !== filterLang) return false;
            return true;
        });

        if (filtered.length === 0) {
            el.innerHTML = `<div class="p-8 text-center text-slate-500 font-bold glass rounded-3xl">No shufflers found.</div>`;
            return;
        }

        let html = '';
        ['A2','E1'].forEach(bldg => {
            const pBldg = filtered.filter(p => p.building === bldg);
            if (!pBldg.length) return;

            html += `<div class="mb-8 glass p-6 rounded-3xl border border-white/10 shadow-xl">
                <h2 class="text-xl font-black text-violet-400 mb-6 border-b border-white/10 pb-4 flex items-center gap-3">
                    <span class="bg-violet-600/20 px-3 py-1 rounded-lg text-violet-400">🏢</span> BUILDING ${bldg}
                </h2>
                <div class="space-y-8">`;

            ['TR','RS','SR'].forEach(lang => {
                const pLang = pBldg.filter(p => getLangOfStudio(p.studio) === lang);
                if (!pLang.length) return;

                html += `<div>
                    <h3 class="text-base font-black text-blue-400 mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-5 bg-blue-500 rounded-full inline-block"></span> ${lang} GROUP
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">`;

                const studios = [...new Set(pLang.map(p => p.studio))].sort((a,b) => a.localeCompare(b, undefined, {numeric:true}));
                studios.forEach(sid => {
                    const pStudio = pLang.filter(p => p.studio === sid);

                    // Current interval info
                    let workingNow = 0;
                    if (state.phase === 2) {
                        workingNow = pStudio.filter(p => p.status==='active' && p.schedule[state.currentInterval] && p.schedule[state.currentInterval]!=='/').length;
                    }

                    html += `<div class="bg-black/30 p-4 rounded-2xl border border-white/5 hover:border-violet-500/20 transition-colors shadow-inner">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-xs font-black text-white bg-slate-800 px-3 py-1.5 rounded-lg">STUDIO ${sid}</h4>
                            <div class="flex items-center gap-2">
                                ${state.phase===2 ? `<span class="text-[9px] text-violet-400 font-bold bg-violet-500/10 px-2 py-1 rounded-md border border-violet-500/20">${workingNow} working</span>` : ''}
                                <span class="text-[9px] text-slate-400 font-bold bg-black/40 px-2 py-1 rounded-md uppercase">${pStudio.length} total</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">`;

                    pStudio.forEach(p => {
                        const isActive = p.status === 'active';
                        const isWorking = isActive && state.phase === 2 && p.schedule[state.currentInterval] && p.schedule[state.currentInterval] !== '/';
                        const isOnBreak = isActive && state.phase === 2 && p.schedule[state.currentInterval] === '/';

                        let bgClass, labelText;
                        if (!isActive) {
                            bgClass = 'bg-slate-800 border-white/5 hover:bg-slate-700';
                            labelText = 'NOT HERE';
                        } else if (isWorking) {
                            bgClass = 'bg-violet-600 border-violet-500 shadow-md ring-1 ring-violet-500/50';
                            labelText = 'WORKING';
                        } else if (isOnBreak) {
                            bgClass = 'bg-amber-600/30 border-amber-500/50 shadow-sm';
                            labelText = 'BREAK';
                        } else {
                            bgClass = 'bg-violet-700/40 border-violet-500/30';
                            labelText = 'ACTIVE';
                        }
                        const textClass = (isActive) ? 'text-white' : 'text-slate-300';

                        html += `<button onclick="toggleStatus('${p.id}')"
                            class="p-2.5 rounded-xl border flex flex-col items-center justify-center gap-1 transition-all active:scale-95 cursor-pointer hover:shadow-lg ${bgClass}">
                            <span class="font-mono text-xs font-black ${textClass}">#${p.id}</span>
                            <span class="text-[7px] uppercase font-bold tracking-widest opacity-80 ${textClass}">${labelText}</span>
                        </button>`;
                    });

                    html += `</div></div>`;
                });

                html += `</div></div>`;
            });

            html += `</div></div>`;
        });

        el.innerHTML = html || `<div class="p-8 text-center text-slate-500 font-bold glass rounded-3xl">No shufflers match filters.</div>`;
    }

    async function toggleStatus(id) {
        const p = state.shufflers.find(x => x.id === id);
        if (!p) return;
        // Toggle: pending ↔ active
        const next = (p.status === 'active') ? 'pending' : 'active';
        if (next === 'active' && !confirm(`"${id}" buradayım – aktive al?`)) return;
        if (next === 'pending' && !confirm(`"${id}" ayrıldı – pasife al?`)) return;

        p.status = next;
        renderList();
        try {
            await fetch('/api/shf/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ shift: state.shift, id, status: next })
            });
        } catch(e) { alert('Durum güncellenemedi: ' + id); }
    }

    setInterval(sync, 4000);
    sync();
</script>
</body>
</html>
